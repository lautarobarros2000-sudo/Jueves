<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juntada Tracker</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

  <header class="app-header">
    <h1>🍻 Juntada Tracker</h1>
    <button class="btn-nueva" id="openNewMeetingBtn">+ Nueva Juntada</button>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab active" data-tab="ranking">🏆 Ranking</button>
    <button class="tab" data-tab="rachas">🔥 Rachas</button>
    <button class="tab" data-tab="historial">📅 Historial</button>
  </nav>

  <!-- TAB: RANKING -->
  <section class="tab-content active" id="tab-ranking">
    <div class="card">
      <div id="streakDictionary"></div>
      <div id="ranking"></div>
    </div>
    <div class="card">
      <h2>🏆 Mejores Rachas Históricas</h2>
      <div id="bestStreaks"></div>
    </div>
  </section>

  <!-- TAB: RACHAS -->
  <section class="tab-content" id="tab-rachas">
    <div class="card">
      <div id="streaks"></div>
    </div>
  </section>

  <!-- TAB: HISTORIAL -->
  <section class="tab-content" id="tab-historial">
    <div class="card">
      <div id="meetingsLog"></div>
    </div>
  </section>

</div>

<!-- MODAL: NUEVA JUNTADA -->
<div class="modal-overlay" id="newMeetingOverlay">
  <div class="modal-box">
    <h3>📅 Nueva Juntada</h3>

    <label class="field-label">Fecha del encuentro</label>
    <input type="date" id="meetingDateInput" class="date-input" />

    <label class="field-label" style="margin-top:16px;">¿Quiénes asistieron?</label>
    <div id="people-list" class="people-grid"></div>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelNewMeeting">Cancelar</button>
      <button class="btn-save" id="saveBtn">Guardar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
