name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 12 */2 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" \
          'https://jvefzcnujhpqgyedmmxp.supabase.co')

          echo "Status: $STATUS"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            exit 1
          fi
